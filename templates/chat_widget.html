<!-- Navigator AI Chat Widget -->
<div id="chat-widget-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'DM Sans', sans-serif;">
    <!-- Chat Button -->
    <button id="chat-toggle" style="width: 60px; height: 60px; border-radius: 30px; background: #1e3a8a; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease;">
        <span id="chat-icon" style="font-size: 28px;">🎓</span>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" style="position: absolute; bottom: 80px; right: 0; width: 350px; height: 500px; background: white; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; border: 1px solid #e2e8f0;">
        <!-- Header -->
        <div style="background: #1e3a8a; color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h3 style="margin: 0; font-size: 1.1rem;">Navigator AI</h3>
                <span style="font-size: 0.75rem; opacity: 0.8;">Conversational Advisor</span>
            </div>
            <button id="chat-close" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" style="flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 15px;">
            <div style="background: white; padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 85%; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.9rem; line-height: 1.4;">
                Namaste! I'm your Education Navigator. How can I help you today?
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white;">
            <input type="text" id="chat-input" placeholder="Ask about colleges, fees..." style="flex-grow: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 0.9rem;">
            <button id="chat-send" style="background: #1e3a8a; color: white; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 1.2rem;">➔</span>
            </button>
        </div>
    </div>
</div>

<script>
    (function() {
        const toggleBtn = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeBtn = document.getElementById('chat-close');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send');
        const messagesArea = document.getElementById('chat-messages');

        toggleBtn.addEventListener('click', () => {
            if (chatWindow.style.display === 'none') {
                chatWindow.style.display = 'flex';
                toggleBtn.style.transform = 'scale(0.9) rotate(90deg)';
                input.focus();
            } else {
                chatWindow.style.display = 'none';
                toggleBtn.style.transform = 'scale(1) rotate(0deg)';
            }
        });

        closeBtn.addEventListener('click', () => {
            chatWindow.style.display = 'none';
            toggleBtn.style.transform = 'scale(1) rotate(0deg)';
        });

        function appendMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.style.padding = '12px 16px';
            msg.style.borderRadius = isUser ? '12px 12px 0 12px' : '12px 12px 12px 0';
            msg.style.maxWidth = '85%';
            msg.style.alignSelf = isUser ? 'flex-end' : 'flex-start';
            msg.style.background = isUser ? '#1e3a8a' : 'white';
            msg.style.color = isUser ? 'white' : '#1e293b';
            msg.style.boxShadow = '0 2px 5px rgba(0,0,0,0.05)';
            msg.style.fontSize = '0.9rem';
            msg.style.lineHeight = '1.4';
            msg.textContent = text;
            messagesArea.appendChild(msg);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, true);
            input.value = '';

            // Loading state
            const loading = document.createElement('div');
            loading.textContent = '...';
            loading.style.color = '#64748b';
            messagesArea.appendChild(loading);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                messagesArea.removeChild(loading);
                appendMessage(data.response);
            } catch (err) {
                console.error(err);
                messagesArea.removeChild(loading);
                appendMessage("Sorry, I'm having trouble connecting to the network.");
            }
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    })();
</script>
