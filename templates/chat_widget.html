<!-- Navigator AI Chat Widget – Conversational Advisor (separate from AI Matcher) -->
<div id="chat-widget-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'DM Sans', sans-serif;">
    <!-- Chat Button -->
    <button id="chat-toggle" style="width: 60px; height: 60px; border-radius: 30px; background: linear-gradient(135deg, #efe3b1 0%, #f4cb73 100%); border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 142, 142, 0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease;">
        <span id="chat-icon" style="font-size: 28px;">💻</span>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" style="position: absolute; bottom: 80px; right: 0; width: 380px; height: 540px; background: white; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; border: 1px solid #e2e8f0;">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h3 style="margin: 0; font-size: 1.1rem;">Navigator AI</h3>
                <span style="font-size: 0.7rem; opacity: 0.9;">Conversational Advisor</span>
            </div>
            <button id="chat-close" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" style="flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 15px;">
            <div style="background: white; padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 90%; align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-size: 0.9rem; line-height: 1.5;">
                Namaste! I'm your Education Navigator AI. Ask me about colleges, fees, events, or scholarships. For <strong>personalized college matching</strong>, use our separate <a href="/ai-match" style="color:#1e40af;font-weight:600;">AI College Matcher</a>.
            </div>
            <div id="chat-quick-actions" style="display: flex; flex-wrap: wrap; gap: 8px;">
                <a href="/ai-match" class="chat-quick-btn" style="text-decoration:none;">Get my matches</a>
                <button class="chat-quick-btn" data-msg="What are the fees for engineering programs?">Fees</button>
                <button class="chat-quick-btn" data-msg="My GPA is 3.5">Set my GPA</button>
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white;">
            <input type="text" id="chat-input" placeholder="Ask about colleges, fees, events..." style="flex-grow: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 0.9rem;">
            <button id="chat-send" style="background: #1e3a8a; color: white; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 1.2rem;">➔</span>
            </button>
        </div>
    </div>
</div>

<style>
    .chat-quick-btn {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .chat-quick-btn:hover {
        background: #1e3a8a;
        color: white;
        border-color: #1e3a8a;
    }
</style>
<script>
    (function() {
        const toggleBtn = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeBtn = document.getElementById('chat-close');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send');
        const messagesArea = document.getElementById('chat-messages');

        toggleBtn.addEventListener('click', () => {
            if (chatWindow.style.display === 'none') {
                chatWindow.style.display = 'flex';
                toggleBtn.style.transform = 'scale(0.9) rotate(90deg)';
                input.focus();
            } else {
                chatWindow.style.display = 'none';
                toggleBtn.style.transform = 'scale(1) rotate(0deg)';
            }
        });

        closeBtn.addEventListener('click', () => {
            chatWindow.style.display = 'none';
            toggleBtn.style.transform = 'scale(1) rotate(0deg)';
        });

        // Quick action buttons (links go directly; buttons send chat message)
        document.querySelectorAll('.chat-quick-btn[data-msg]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const msg = btn.getAttribute('data-msg');
                if (msg) { input.value = msg; handleSend(); }
            });
        });

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.alignItems = isUser ? 'flex-end' : 'flex-start';
            wrapper.style.maxWidth = '95%';

            const msg = document.createElement('div');
            msg.style.padding = '12px 16px';
            msg.style.borderRadius = isUser ? '12px 12px 0 12px' : '12px 12px 12px 0';
            msg.style.background = isUser ? '#1e3a8a' : 'white';
            msg.style.color = isUser ? 'white' : '#1e293b';
            msg.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)';
            msg.style.fontSize = '0.9rem';
            msg.style.lineHeight = '1.5';
            msg.innerHTML = (typeof text === 'string' ? text : '').replace(/\n/g, '<br>');
            wrapper.appendChild(msg);
            messagesArea.appendChild(wrapper);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, true);
            input.value = '';

            const loading = document.createElement('div');
            loading.textContent = 'Thinking...';
            loading.style.color = '#64748b';
            loading.style.fontSize = '0.85rem';
            messagesArea.appendChild(loading);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                messagesArea.removeChild(loading);
                appendMessage(data.response, false);
            } catch (err) {
                console.error(err);
                messagesArea.removeChild(loading);
                appendMessage("Sorry, I'm having trouble connecting. Please try again.");
            }
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    })();
</script>
