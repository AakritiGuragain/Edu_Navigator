<!-- Navigator AI Chat Widget – Conversational Advisor (separate from AI Matcher) -->
<div id="chat-widget-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'DM Sans', sans-serif;">
    <!-- Chat Button -->
    <button id="chat-toggle" class="chat-pulse" style="width: 66px; height: 66px; border-radius: 33px; background: linear-gradient(135deg, #0c1f3a 0%, #1e4d82 100%); border: none; cursor: pointer; box-shadow: 0 12px 30px rgba(18, 44, 79, 0.4); display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);">
        <svg id="chat-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s ease;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" style="position: absolute; bottom: 80px; right: 0; width: 380px; height: 540px; background: white; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; border: 1px solid #e2e8f0;">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #0c1f3a 0%, #122C4F 60%, #1e4d82 100%); color: white; padding: 22px 20px; display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h3 style="margin: 0; font-size: 1.1rem;">Navigator AI</h3>
                <span style="font-size: 0.7rem; opacity: 0.9;">Conversational Advisor</span>
            </div>
            <button id="chat-close" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" style="flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 15px;">
            <div style="background: white; padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 90%; align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-size: 0.9rem; line-height: 1.5;">
                Namaste! I'm your Education Navigator AI. Ask me about colleges, fees, events, or scholarships. For <strong>personalized college matching</strong>, use our separate <a href="/ai-match" style="color:#1e40af;font-weight:600;">AI College Matcher</a>.
            </div>
            <div id="chat-quick-actions" style="display: flex; flex-wrap: wrap; gap: 8px;">
                <a href="/ai-match" class="chat-quick-btn" style="text-decoration:none;">Get my matches</a>
                <button class="chat-quick-btn" data-msg="What are the fees for engineering programs?">Fees</button>
                <button class="chat-quick-btn" data-msg="My GPA is 3.5">Set my GPA</button>
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white; border-radius: 0 0 16px 16px;">
            <input type="text" id="chat-input" placeholder="Ask about colleges, fees, events..." style="flex-grow: 1; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 20px; outline: none; font-size: 0.95rem; background:#f8fafc; transition: border-color 0.2s;">
            <button id="chat-send" style="background: linear-gradient(135deg, #122C4F, #1e4d82); color: white; border: none; width: 44px; height: 44px; border-radius: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(18,44,79,0.2); transition: transform 0.2s;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<style>
    /* Input Focus */
    #chat-input:focus {
        border-color: #5B88B2 !important;
        background: #ffffff !important;
    }
    
    #chat-send:hover {
        transform: translateY(-2px) scale(1.05);
    }
    
    #chat-toggle:hover {
        transform: translateY(-4px) scale(1.05);
        box-shadow: 0 16px 40px rgba(18, 44, 79, 0.5);
    }

    .chat-pulse {
        animation: pulse-ring 3s infinite;
    }
    
    @keyframes pulse-ring {
        0% { box-shadow: 0 0 0 0 rgba(30, 77, 130, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(30, 77, 130, 0); }
        100% { box-shadow: 0 0 0 0 rgba(30, 77, 130, 0); }
    }

    .chat-quick-btn {
        background: #ffffff;
        color: #122C4F;
        border: 1.5px solid #dbe4f0;
        padding: 8px 14px;
        border-radius: 30px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 2px 6px rgba(18,44,79,0.05);
    }
    .chat-quick-btn:hover {
        background: #f0f7ff;
        color: #122C4F;
        border-color: #5B88B2;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(18,44,79,0.12);
    }
</style>
<script>
    (function() {
        const toggleBtn = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeBtn = document.getElementById('chat-close');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send');
        const messagesArea = document.getElementById('chat-messages');

        toggleBtn.addEventListener('click', () => {
            if (chatWindow.style.display === 'none') {
                chatWindow.style.display = 'flex';
                toggleBtn.style.transform = 'scale(0.9) rotate(90deg)';
                input.focus();
            } else {
                chatWindow.style.display = 'none';
                toggleBtn.style.transform = 'scale(1) rotate(0deg)';
            }
        });

        closeBtn.addEventListener('click', () => {
            chatWindow.style.display = 'none';
            toggleBtn.style.transform = 'scale(1) rotate(0deg)';
        });

        // Quick action buttons (links go directly; buttons send chat message)
        document.querySelectorAll('.chat-quick-btn[data-msg]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const msg = btn.getAttribute('data-msg');
                if (msg) { input.value = msg; handleSend(); }
            });
        });

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.alignItems = isUser ? 'flex-end' : 'flex-start';
            wrapper.style.maxWidth = '95%';

            const msg = document.createElement('div');
            msg.style.padding = '12px 18px';
            msg.style.borderRadius = isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px';
            msg.style.background = isUser ? 'linear-gradient(135deg, #122C4F, #1e4d82)' : 'white';
            msg.style.color = isUser ? 'white' : '#0f172a';
            msg.style.boxShadow = '0 3px 12px rgba(18,44,79,0.08)';
            msg.style.fontSize = '0.95rem';
            msg.style.lineHeight = '1.5';
            msg.innerHTML = (typeof text === 'string' ? text : '').replace(/\n/g, '<br>');
            wrapper.appendChild(msg);
            messagesArea.appendChild(wrapper);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, true);
            input.value = '';

            const loading = document.createElement('div');
            loading.textContent = 'Thinking...';
            loading.style.color = '#64748b';
            loading.style.fontSize = '0.85rem';
            messagesArea.appendChild(loading);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                messagesArea.removeChild(loading);
                appendMessage(data.response, false);
            } catch (err) {
                console.error(err);
                messagesArea.removeChild(loading);
                appendMessage("Sorry, I'm having trouble connecting. Please try again.");
            }
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    })();
</script>
